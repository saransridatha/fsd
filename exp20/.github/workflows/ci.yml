name: Backend CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: exp20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -v

  docker-build-and-run:
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: exp20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t exp20-backend:latest .

      - name: Run Docker container
        run: docker run -d --name exp20-backend -p 5000:5000 exp20-backend:latest

      - name: Verify container is running
        run: |
          sleep 5
          docker ps
          curl --fail http://localhost:5000/

      - name: Stop container
        if: always()
        run: |
          docker stop exp20-backend || true
          docker rm exp20-backend || true
